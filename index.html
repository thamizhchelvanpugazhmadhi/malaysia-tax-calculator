<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaysia Expat Tax Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Malaysia Expat Tax Calculator</h1>
        
        <form id="taxForm">
            <label for="income">Total Annual Income (RM):</label>
            <input type="number" id="income" placeholder="e.g. 120000" required>

            <label for="days">Days Spent in Malaysia:</label>
            <input type="number" id="days" placeholder="e.g. 183" required>

            <button type="button" onclick="calculateTax()">Calculate My Tax</button>
        </form>

        <div id="results" style="display:none; margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px;">
            </div>

        <p class="disclaimer" style="margin-top: 30px; font-size: 0.8em; color: #666;">
            Disclaimer: This calculator provides an estimate based on LHDN YA 2024/2025 data. Please consult a qualified tax professional for official advice.
        </p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
